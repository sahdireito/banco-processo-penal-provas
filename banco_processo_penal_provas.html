<script>
const QUESTOES = [
  {num:1, exame:"XLV Exame — 2025", titulo:"Quebra da Cadeia de Custódia — Nexo Causal", enunciado:"Caim, desejando matar Abel, lhe ofereceu um pastel de camarão durante uma festa, sabendo que esse alimento lhe causaria severa alergia. Abel consumiu o pastel oferecido por Caim, além de diversos outros salgados e, em sequência, teve uma violenta crise alérgica, vindo a falecer. Acionada a polícia, os investigadores recolheram, em um mesmo invólucro, todos os alimentos da festa, os quais foram submetidos à perícia, que concluiu que todos os alimentos continham traços de camarão suficientes para causar a morte, não se podendo precisar se a contaminação ocorreu no preparo ou no recolhimento pela Polícia. A necropsia revelou que o consumo de substância alergênica causou a morte de Abel. Não é mais possível repetir a colheita de vestígios e a perícia dos alimentos.", comando:"Como advogado de Caim, é correto afirmar que a quebra da cadeia de custódia enseja", gabarito:"B", alt:{"A": "a ausência de fiabilidade do laudo de necrópsia.", "B": "a ausência de prova fiável do nexo de causalidade.", "C": "a nulidade absoluta do processo, atingindo todas as provas produzidas.", "D": "a nulidade da prova pericial, a qual deve ser desentranhada do processo."}, fb:{"A": "Incorreta. A necropsia é prova independente e confiável — ela apenas constata a CAUSA DA MORTE (reação alérgica), o que não foi contaminado pela falha no recolhimento dos alimentos.", "B": "Correta! Art. 158-A, CPP: a cadeia de custódia preserva a rastreabilidade e autenticidade dos vestígios. Como TODOS os alimentos foram recolhidos no mesmo invólucro, sem separação individual, e a contaminação pode ter ocorrido tanto na cozinha quanto durante o recolhimento policial — não há como afirmar com segurança que foi especificamente o pastel oferecido por Caim que causou a morte. A quebra da cadeia de custódia compromete a prova do NEXO CAUSAL entre a conduta de Caim e o resultado morte.", "C": "Incorreta. A jurisprudência (STJ) é firme: a quebra da cadeia de custódia NÃO gera automaticamente nulidade absoluta de todo o processo — afeta a CONFIABILIDADE da prova específica, não contamina indiscriminadamente todas as demais provas.", "D": "Incorreta. Não há consequência automática de desentranhamento da perícia. O problema não é a invalidade formal da prova, mas a perda de sua força probante para demonstrar especificamente que o alimento de Caim causou a morte."}, fund:"Art. 158-A, CPP: cadeia de custódia — conjunto de procedimentos para preservar e documentar a história cronológica do vestígio. Jurisprudência STJ: a quebra da cadeia de custódia não gera nulidade automática, mas compromete o valor probatório, podendo impedir a demonstração segura de elementos do crime, como o nexo causal.", caqui:"Cadeia de custódia quebrada ≠ nulidade automática. É uma questão de CONFIABILIDADE da prova, não de validade formal. Aqui, o problema é cirúrgico: a perícia não consegue dizer qual alimento especificamente continha o camarão desde a origem — pode ter sido contaminação cruzada no recolhimento. Sem saber QUAL alimento tinha camarão desde o início, não dá para provar com segurança que foi O PASTEL DE CAIM que matou Abel. Isso ataca o NEXO CAUSAL — elemento essencial para a imputação do homicídio a Caim."},
  {num:2, exame:"XLIV Exame — 2025", titulo:"Diligências Complementares Após a Instrução — Art. 402 CPP", enunciado:"Flávio foi preso em flagrante junto com outros três indivíduos, acusados de roubo (art. 157, CP). Permaneceu preso preventivamente. Na audiência de instrução, uma testemunha de defesa afirmou que Flávio estava trabalhando na loja em frente ao local do crime e foi preso por engano. A testemunha mencionou que a loja possui câmeras de segurança e o dono guardou as imagens. O interrogatório dos réus foi regularmente realizado.", comando:"Diante do fato narrado, assinale a opção que indica a medida jurídica que você, como advogado de Flávio, deve adotar.", gabarito:"B", alt:{"A": "Apresentar alegações finais por memoriais, requerendo as imagens da loja.", "B": "Requerer diligências para oficiar à loja de material de construções para que forneça as imagens do dia dos fatos.", "C": "Apresentar alegações finais orais em audiência, com pedido de absolvição sumária, diante do depoimento da testemunha.", "D": "Requerer a nulidade da audiência de instrução e julgamento, pois as imagens da loja não foram apresentadas em sede policial."}, fb:{"A": "Incorreta. Antes de apresentar alegações finais, o procedimento correto é requerer a DILIGÊNCIA COMPLEMENTAR para obter as imagens — não basta mencioná-las em memoriais sem buscar sua efetiva juntada ao processo.", "B": "Correta! Art. 402, CPP: encerrada a instrução, as partes poderão requerer diligências cuja necessidade se origine de circunstâncias ou fatos apurados na instrução. A existência das imagens só foi revelada DURANTE a audiência — é exatamente a hipótese do art. 402. A defesa deve requerer diligência para oficiar à loja antes de seguir para as alegações finais.", "C": "Incorreta. A absolvição sumária (art. 397, CPP) ocorre ANTES da instrução, em momento processual já superado. Não cabe nesta fase.", "D": "Incorreta. Não há nulidade — as imagens nunca foram requisitadas na fase policial, e não havia obrigação de apresentá-las antes. O fato é novo e surgiu apenas na instrução."}, fund:"Art. 402, CPP: encerrada a instrução, as partes podem requerer diligências cuja necessidade se origine de circunstâncias ou fatos apurados na instrução. Art. 397, CPP: absolvição sumária ocorre antes da instrução (fase de defesa prévia).", caqui:"Fórmula simples: surgiu um fato NOVO durante a audiência (existência de imagens que ninguém sabia) = peça diligência complementar (art. 402 CPP), ANTES das alegações finais. É diferente de absolvição sumária (que é etapa anterior, já passada) e diferente de nulidade (não há vício processual aqui — apenas uma prova nova a ser produzida)."},
  {num:3, exame:"XLIV Exame — 2025", titulo:"Furto Qualificado por Rompimento de Obstáculo — Ausência de Perícia", enunciado:"André foi denunciado por subtrair a bolsa de Márcia mediante rompimento de obstáculo. A subtração foi legitimamente comprovada no processo, porém, embora o rompimento de obstáculo tenha deixado vestígios, não foi realizada qualquer perícia, sem justificativa plausível. Finda a instrução, o MP se manifestou pela condenação conforme a denúncia, sem requerer qualquer diligência.", comando:"Dada a palavra ao advogado de André, em alegações finais defensivas, este deve requerer", gabarito:"B", alt:{"A": "a absolvição sumária de André, por não constituir o fato infração penal.", "B": "o afastamento da qualificadora do furto, desclassificando a conduta para furto simples.", "C": "a nulidade do processo desde o recebimento da denúncia, a fim de que seja realizada a prova pericial.", "D": "a conversão do julgamento em diligência, a fim de que se realize prova pericial para comprovar a existência do rompimento de obstáculo."}, fb:{"A": "Incorreta. A subtração foi comprovada — existe infração penal (furto). O fato não deixa de ser crime; o que falta é prova da QUALIFICADORA específica.", "B": "Correta! Art. 158, CPP: quando a infração deixar vestígios, é indispensável o exame de corpo de delito, direto ou indireto. O rompimento de obstáculo deixou vestígios, mas não houve perícia sem justificativa plausível. Sem essa prova pericial, a qualificadora não pode ser reconhecida — mas como a subtração (furto base) está comprovada, a solução é desclassificar para FURTO SIMPLES, afastando apenas a qualificadora não comprovada.", "C": "Incorreta. Não há nulidade de todo o processo desde o recebimento da denúncia. O vício atinge apenas a prova da qualificadora, não contamina o processo inteiro.", "D": "Incorreta. Não cabe 'salvar' a falha da acusação convertendo o julgamento em diligência para produzir tardiamente a prova que deveria ter sido feita no momento oportuno. A consequência correta é desclassificar — não reabrir a instrução para suprir a omissão acusatória."}, fund:"Art. 158, CPP: exame de corpo de delito é indispensável quando a infração deixa vestígios. Jurisprudência consolidada: ausência injustificada de perícia em qualificadora que deixa vestígios impede seu reconhecimento, levando à desclassificação para o tipo simples (se a conduta base estiver comprovada).", caqui:"Regra de ouro: qualificadora que deixa vestígios SEM perícia (e sem justificativa) = não pode ser reconhecida. Mas isso não anula o crime inteiro — apenas 'rebaixa' para a forma simples se a conduta básica (subtração) já está provada por outros meios. Não se pede para 'tentar de novo' a perícia depois — a chance passou; a consequência processual é a desclassificação."},
  {num:4, exame:"XXXIX Exame — 2023", titulo:"Acareação e o Princípio da Não Autoincriminação", enunciado:"Osvaldo foi denunciado pela prática do crime de estelionato em coautoria com Flávio. Durante a instrução, uma testemunha (Fabiana) apresentou versão conflitante com as das defesas. O MP requereu acareação (art. 229, CPP) entre Osvaldo, Flávio e Fabiana. A defesa de Osvaldo informou que ele não iria participar, mas o MP insistiu para que o Juízo determinasse que Osvaldo se submetesse ao ato, sob pena de desobediência.", comando:"Sobre o caso narrado, assinale a afirmativa que indica o princípio que você, como advogado de Osvaldo, deve alegar em defesa do seu cliente.", gabarito:"D", alt:{"A": "O da ampla defesa veda a realização de acareação entre testemunhas de defesa e de acusação, pois cada parte tem o ônus de provar os fatos que alega.", "B": "O de fundamentação das decisões exige que, ao determinar a realização de uma prova, o Juízo indique concretamente as razões que a justifiquem, sob pena de nulidade.", "C": "O de presunção de inocência impede a participação do réu em procedimento de acareação, ainda que a ele se apresente voluntariamente.", "D": "O de não autoincriminação ampara a pretensão de Osvaldo de não se submeter à produção de provas que exigem participação ativa do denunciado, tal como a acareação."}, fb:{"A": "Incorreta. A acareação entre testemunhas de acusação e defesa é admitida pelo CPP — não há vedação por conta da ampla defesa.", "B": "Incorreta. A fundamentação das decisões é relevante, mas não é o ponto central da questão — o foco é se o réu pode ser compelido a participar do ato.", "C": "Incorreta. A presunção de inocência não impede a participação VOLUNTÁRIA do réu na acareação — o que se discute é a possibilidade de o ato ser IMPOSTO compulsoriamente.", "D": "Correta! Princípio do nemo tenetur se detegere (não autoincriminação): ninguém é obrigado a produzir prova contra si mesmo. A acareação, quando envolve o acusado, exige participação ativa (comparecer, ouvir versões conflitantes, responder, se posicionar) — atividade que pode contribuir para sua própria incriminação. Osvaldo pode se recusar a participar, sem que isso configure desobediência."}, fund:"Princípio nemo tenetur se detegere (não autoincriminação), decorrente do art. 5º, LXIII, CF (direito ao silêncio) em sua acepção ampla: o acusado não pode ser compelido a participar ativamente de atos probatórios que possam contribuir para sua incriminação, como a acareação.", caqui:"O nemo tenetur se detegere vai além de 'ficar calado no interrogatório' — protege o réu de qualquer ato que exija COLABORAÇÃO ATIVA na produção de prova contra si mesmo. A acareação exige comparecimento, escuta de versões conflitantes e posicionamento ativo — é exatamente o tipo de ato que o réu pode recusar sem consequências (não comete desobediência, não prejudica sua defesa)."},
  {num:5, exame:"XXXIV Exame — 2022", titulo:"Confissão Informal Gravada e Laudo Pericial Não Repetível", enunciado:"Francisco foi preso em flagrante por furto qualificado com rompimento de obstáculo, confirmado por exame pericial no local. Na delegacia, em conversa informal com a autoridade policial, confessou o crime, fato registrado em gravação de áudio no celular pessoal do Delegado. Quando ouvido formalmente, exerceu o direito ao silêncio. O MP juntou o laudo pericial e o áudio da confissão informal.", comando:"No momento das alegações finais, o advogado de Francisco, sob o ponto de vista técnico, deverá destacar que", gabarito:"C", alt:{"A": "a condenação não poderá se basear exclusivamente no laudo de exame de local, considerando que não foi produzido sob crivo do contraditório, e o áudio acostado, apesar de não poder ser considerado prova ilícita, se valorado na sentença, deverá justificar o reconhecimento da atenuante da pena da confissão.", "B": "tanto o áudio com a confissão informal quanto o laudo de exame de local são provas lícitas, podendo, inclusive, o magistrado fundamentar eventual condenação com base exclusivamente no exame pericial produzido antes da instrução probatória.", "C": "a confissão informal foi obtida de maneira ilícita, devendo ser o áudio desentranhado do processo, mas poderá o laudo pericial ser considerado em eventual sentença, apesar de produzido antes de ser instaurado o contraditório.", "D": "tanto o áudio com a confissão informal quanto o laudo de exame de local são provas ilícitas, devendo ser desentranhados do processo."}, fb:{"A": "Incorreta. O laudo pericial sobre vestígios do local É válido mesmo produzido antes do contraditório (prova técnica não repetível). E o áudio da confissão informal É ilícito — não pode justificar atenuante alguma.", "B": "Incorreta. A confissão informal gravada de forma improvisada, sem as garantias do interrogatório formal (e contrariando o exercício posterior do direito ao silêncio), é PROVA ILÍCITA.", "C": "Correta! Dois pontos distintos: (1) O LAUDO PERICIAL de local é prova técnica sobre vestígios do crime, válida mesmo produzida na investigação (prova cautelar/não repetível), podendo ser considerada na sentença. (2) A CONFISSÃO INFORMAL gravada sem as formalidades do interrogatório, captada de modo improvisado pelo celular pessoal do Delegado, viola as garantias do investigado (especialmente porque, formalmente ouvido depois, ele exerceu o direito ao silêncio) — é prova ILÍCITA e deve ser desentranhada.", "D": "Incorreta. O laudo pericial NÃO é ilícito — é prova técnica regular sobre vestígios, distinta da confissão informal."}, fund:"Provas periciais não repetíveis (sobre vestígios do crime) podem ser produzidas na investigação e valoradas judicialmente. Confissão informal colhida sem observância das garantias formais do interrogatório (sigilo, direito ao silêncio) é prova ilícita.", caqui:"Distinguir dois tipos de prova: LAUDO SOBRE VESTÍGIO FÍSICO (arrombamento, local do crime) = prova técnica, cautelar, não repetível — geralmente válida mesmo sem contraditório prévio. 'CONFISSÃO DE CORREDOR' gravada informalmente no celular do delegado = sem as garantias do interrogatório formal, contraria o direito ao silêncio exercido depois — tendência de ser tratada como prova ILÍCITA. A FGV gosta de testar se você separa esses dois institutos na mesma questão."},
  {num:6, exame:"XXXIV Exame — 2022", titulo:"Citação por Edital, Art. 366 CPP e Produção Antecipada de Provas", enunciado:"José, primário e de bons antecedentes, foi denunciado por receptação simples. Não localizado, foi citado por edital e não compareceu nem constituiu advogado. O magistrado suspendeu o processo e a prescrição, decretou a prisão preventiva (pelo simples fato da não localização) e determinou produção antecipada de provas: oitiva de Maria (90 anos, internada, com risco de falecer) e oitiva de Bruno (vítima, 22 anos), sob o fundamento de que o decurso do tempo poderia prejudicar a oitiva e gerar esquecimento.", comando:"Considerando apenas as informações expostas, o advogado de José deverá buscar o reconhecimento de que", gabarito:"B", alt:{"A": "a suspensão do processo após citação por edital foi legal, mas não a suspensão do prazo prescricional, já que o magistrado determinou a produção antecipada de provas.", "B": "o magistrado poderia ter determinado a produção antecipada de provas em relação à Maria, mas não em relação à oitiva de Bruno, sendo, ainda, inadequada a decretação da prisão preventiva.", "C": "a prisão foi decretada de maneira inadequada, mas a determinação da oitiva de Maria e de Bruno de maneira antecipada foi correta.", "D": "não poderiam ser produzidas quaisquer provas antecipadas, já que o processo encontrava-se suspenso, apesar de legal a decretação da prisão preventiva."}, fb:{"A": "Incorreta. Art. 366, CPP autoriza expressamente a suspensão TANTO do processo QUANTO do prazo prescricional, simultaneamente — a produção de provas antecipadas não afasta essa suspensão.", "B": "Correta! Quatro pontos: (1) suspensão do processo e prescrição = legal (art. 366, CPP); (2) oitiva antecipada de Maria (90 anos, internada, risco de morte) = URGÊNCIA CONCRETA, justifica a antecipação; (3) oitiva antecipada de Bruno (jovem de 22 anos, fundamento apenas no 'decurso do tempo pode gerar esquecimento') = fundamento GENÉRICO, insuficiente — jurisprudência exige urgência concreta, não mero risco abstrato de esquecimento; (4) prisão preventiva decretada apenas por José não ter sido localizado = INADEQUADA, falta fundamentação dos requisitos do art. 312, CPP (fumus comissi delicti + periculum libertatis).", "C": "Incorreta. A oitiva de Bruno não foi corretamente fundamentada — falta urgência concreta, apenas alegação genérica de decurso do tempo.", "D": "Incorreta. O art. 366, CPP permite expressamente a produção antecipada de provas urgentes mesmo com o processo suspenso. E a prisão preventiva NÃO foi corretamente decretada."}, fund:"Art. 366, CPP: citação por edital sem comparecimento = suspensão do processo e da prescrição, podendo o juiz determinar produção antecipada de provas urgentes e decretar prisão preventiva, se presentes os requisitos do art. 312, CPP. Jurisprudência STJ/STF: produção antecipada de prova exige urgência CONCRETA — mero decurso do tempo não basta.", caqui:"O art. 366 CPP é um 'pacote completo': suspende processo + prescrição, permite prova antecipada urgente, permite preventiva SE presentes os requisitos. Mas cada elemento precisa de fundamento próprio: Maria (90 anos, internada, risco de morte) = urgência real, prova antecipada válida. Bruno (jovem, fundamento genérico de 'esquecimento') = sem urgência concreta, prova antecipada inválida. Preventiva só por 'não ter sido encontrado' = sem fundamento do art. 312, inválida. Decore: réu não localizado NÃO gera preventiva automática."},
  {num:7, exame:"XXXIII Exame — 2021", titulo:"Furto Qualificado — Escalada com Perícia e Rompimento sem Perícia", enunciado:"Vanessa foi presa em flagrante por furto em residência. A vítima Jurema (61 anos) viu, pelas câmeras, Vanessa escalando o muro alto e acreditava que ela rompeu o cadeado (que estava arrombado). Houve perícia confirmando a altura do muro e o esforço exigido para escalá-lo, mas NÃO foi realizada perícia no cadeado/porta. No interrogatório, Vanessa confessou os fatos, incluindo o rompimento do cadeado, e informou saber que a vítima era idosa. A vítima não compareceu, mas juntou sua CNH e referiu-se às imagens da câmera já juntadas.", comando:"Você, como advogado de Vanessa, deverá alegar que", gabarito:"B", alt:{"A": "a perícia realizada no muro não poderá ser considerada prova, mas tão só elemento informativo a ser confirmado por provas produzidas sob o crivo do contraditório, tendo em vista que as partes não participaram da elaboração do laudo.", "B": "deve ser afastada a qualificadora com fundamento no rompimento de obstáculo, já que não foi produzida prova pericial, não sendo suficiente a confissão da acusada.", "C": "a perícia realizada para demonstrar a escalada foi inválida, pois não foi realizada por dois peritos oficiais, nos termos da determinação do Código de Processo Penal.", "D": "a idade da vítima não foi comprovada por documento idôneo, não podendo ser reconhecida agravante por tal fundamento."}, fb:{"A": "Incorreta. O laudo pericial sobre o muro É prova válida (não mero elemento informativo), mesmo produzido na investigação — perícias sobre vestígios físicos não repetíveis podem ser valoradas judicialmente.", "B": "Correta! Art. 158, CPP: o rompimento de obstáculo deixou vestígios, mas não houve perícia. A confissão de Vanessa (mesmo admitindo o rompimento) NÃO SUPRE a ausência do exame pericial obrigatório quando há vestígios. Sem perícia, deve ser AFASTADA a qualificadora do rompimento de obstáculo. A qualificadora da escalada, por sua vez, foi devidamente comprovada por perícia válida, podendo subsistir.", "C": "Incorreta. Desde a Lei 11.690/2008, basta UM perito oficial para a perícia — não há mais exigência de dois peritos. A perícia da escalada é válida.", "D": "Incorreta. A CNH (carteira de habilitação) é documento idôneo para comprovar a idade da vítima — a agravante pode ser reconhecida com base nesse documento."}, fund:"Art. 158, CPP: exame de corpo de delito indispensável quando há vestígios. Confissão não supre a ausência de perícia obrigatória. Lei 11.690/2008: 1 perito oficial é suficiente para a perícia.", caqui:"Questão 'gêmea' da Q3: mesma lógica, contexto diferente. Aqui há DUAS qualificadoras: ESCALADA (com perícia válida = subsiste) e ROMPIMENTO DE OBSTÁCULO (sem perícia, mesmo com confissão = cai). Decore: confissão do réu NUNCA substitui exame pericial obrigatório quando há vestígios. E lembre: 1 perito oficial já basta — não exige dois."},
  {num:8, exame:"XXIX Exame — 2019", titulo:"Laudo Pericial, Interrogatório por Videoconferência e Valor da Prova", enunciado:"Tomás e Sérgio foram denunciados por estupro de vulnerável (art. 217-A, CP). Laudo de perito psicólogo oficial (único perito) avaliou a criança vítima, concluindo pela ocorrência do crime — as partes tiveram acesso posterior ao laudo, mas foram intimadas previamente da realização da perícia. O magistrado, diante de notícia concreta de plano de fuga armado, determinou interrogatório por videoconferência — réus ouvidos separadamente, ambos acompanhados de defesa técnica em ambos os locais durante todo o ato.", comando:"Considerando apenas as informações narradas, José (novo advogado contratado) deverá esclarecer que", gabarito:"C", alt:{"A": "o interrogatório dos réus não poderia ter sido realizado separadamente, tendo em vista que o acusado tem direito a conhecer todas as provas que possam lhe prejudicar.", "B": "não poderia ter sido realizado interrogatório por videoconferência, mas tão só oitiva das testemunhas na ausência dos acusados, diante do direito de presença do réu e ausência de previsão legal do motivo mencionado pelo magistrado.", "C": "o laudo acostado ao procedimento foi válido em relação à sua elaboração, mas o juiz não ficará adstrito aos termos dele, podendo aceitá-lo ou rejeitá-lo, no todo ou em parte.", "D": "o laudo deverá ser desentranhado dos autos, tendo em vista que elaborado por apenas um perito oficial, sendo certo que a lei exige que sejam dois profissionais e que seja oportunizada às partes apresentação de quesitos complementares."}, fb:{"A": "Incorreta. Não há vedação ao interrogatório separado de corréus — é compatível com o procedimento penal, especialmente diante do risco de fuga e segurança.", "B": "Incorreta. O CPP autoriza o interrogatório por videoconferência em hipóteses excepcionais fundamentadas, incluindo risco de fuga e segurança pública — exatamente o caso narrado.", "C": "Correta! O laudo elaborado por UM perito oficial é válido (regra desde a Lei 11.690/2008). O magistrado é o destinatário da prova e NÃO fica vinculado às conclusões periciais — pode acolhê-las total ou parcialmente, desde que fundamente. O laudo do psicólogo é elemento de convicção, não verdade absoluta automática.", "D": "Incorreta. Não se exige mais dois peritos oficiais — um perito oficial é suficiente desde 2008. Não há vício a justificar desentranhamento por esse motivo."}, fund:"Lei 11.690/2008: alterou o CPP para exigir apenas 1 perito oficial. CPP: interrogatório por videoconferência admitido excepcionalmente, por decisão fundamentada (risco à segurança, ordem pública, plano de fuga). Princípio do livre convencimento motivado: juiz não está adstrito ao laudo pericial.", caqui:"Três pontos técnicos nessa questão: (1) 1 perito oficial basta — desde 2008, acabou a exigência de dois. (2) Videoconferência é EXCEÇÃO mas válida quando há fundamentação concreta (aqui: plano de fuga armado documentado). (3) Laudo pericial NUNCA vincula o juiz automaticamente — é prova sujeita a livre apreciação motivada, podendo ser aceita total, parcialmente ou rejeitada."},
  {num:9, exame:"XXIX Exame — 2019", titulo:"Reconhecimento de Pessoas — Vício na Composição dos Figurantes", enunciado:"Glauber foi denunciado por roubo majorado. Na audiência, realizada na ausência do réu (temor da vítima, impossibilidade de videoconferência), a vítima descreveu o autor como 'branco e baixo' e respondeu perguntas das partes. Foi conduzida para reconhecimento formal: colocaram, com as mesmas roupas, lado a lado, Glauber (branco e baixo), Lucas (branco e alto) e Thiago (negro e baixo) — apesar da carceragem estar repleta de presos com características semelhantes às descritas. A vítima reconheceu Glauber.", comando:"O advogado de Glauber, de acordo com o CPP e a jurisprudência dos Tribunais Superiores, deverá consignar seu inconformismo em relação ao reconhecimento realizado pela vítima", gabarito:"C", alt:{"A": "em razão da oitiva da vítima na ausência do réu, já que o direito de autodefesa inclui o direito de presença em todos os atos do processo.", "B": "tendo em vista que, de acordo com as previsões do Código de Processo Penal, ela não poderia ter descrito as características do autor dos fatos antes da realização do reconhecimento.", "C": "em razão das características físicas apresentadas pelas demais pessoas colocadas ao lado do réu quando da realização do ato, tendo em vista a possibilidade de participarem outras pessoas com características semelhantes.", "D": "tendo em vista que o auto de reconhecimento deveria ter sido subscrito pelo juiz, pelo réu, por seu defensor e pelo Ministério Público, além de três testemunhas presenciais."}, fb:{"A": "Incorreta. A oitiva da vítima na ausência do réu foi justificada (temor da vítima, impossibilidade de videoconferência) e não é o vício central cobrado pela questão.", "B": "Incorreta. A descrição prévia das características do autor pela vítima é etapa regular do procedimento de reconhecimento (art. 226, CPP) — não é vício.", "C": "Correta! Art. 226, CPP: o reconhecimento deve, sempre que possível, colocar a pessoa a ser reconhecida ao lado de outras com semelhança física. No caso, NENHUM dos 'figurantes' (Lucas — branco e alto; Thiago — negro e baixo) reunia ambas as características descritas (branco E baixo) — apenas Glauber correspondia integralmente à descrição. Isso torna o reconhecimento SUGESTIVO e contamina sua confiabilidade, especialmente porque havia outras pessoas disponíveis com características semelhantes (a carceragem estava repleta delas) e a cautela não foi observada sem justificativa.", "D": "Incorreta. O CPP não exige essa formalidade específica (assinatura de réu, defensor, MP e três testemunhas) — essas exigências são inventadas pela alternativa."}, fund:"Art. 226, CPP: o reconhecimento de pessoas deve, sempre que possível, colocar o reconhecendo ao lado de outras pessoas que com ele tenham qualquer semelhança. Jurisprudência STF/STJ (especialmente após HC 598.886/STJ): a inobservância dessa cautela compromete a confiabilidade do reconhecimento, sobretudo quando havia condições de cumpri-la adequadamente.", caqui:"O vício central NÃO está em descrever o autor antes (isso é normal e exigido pelo procedimento) — está na ESCOLHA RUIM dos figurantes. Se a vítima descreveu 'branco e baixo', os figurantes deveriam compartilhar essas duas características — não apenas uma delas isoladamente. Como só Glauber batia com a descrição completa, o reconhecimento virou praticamente um 'aponte o único que combina' — altamente sugestivo. E o agravante: havia gente disponível com características compatíveis e ninguém usou. Esse é o tipo de vício que os tribunais superiores vêm reconhecendo com mais rigor nos últimos anos."},
  {num:10, exame:"XXVIII Exame — 2019", titulo:"Busca Domiciliar Noturna e Busca Pessoal por Fundada Suspeita", enunciado:"Adolfo e Arnaldo são irmãos. Durante investigação de tráfico de drogas, foi deferida busca e apreensão na residência de Adolfo. O oficial de justiça, com mandado regularmente expedido, compareceu à residência às 03h00 (por informações de que ele sairia às 07h00). Sem autorização do proprietário, ingressou no local, apreendendo um caderno com anotações. Ao sair, na rua, encontraram Arnaldo, apontado por uma senhora como autor de roubo majorado momentos antes. Foi feita busca pessoal em Arnaldo, encontrando um celular produto do crime.", comando:"Assinale a opção que apresenta, sob o ponto de vista técnico, a medida que você poderá adotar.", gabarito:"B", alt:{"A": "Pleitear a invalidade da busca e apreensão residencial de Adolfo e a da busca e apreensão pessoal em Arnaldo.", "B": "Pleitear a invalidade da busca e apreensão residencial de Adolfo, mas não a da busca e apreensão pessoal de Arnaldo.", "C": "Não poderá pleitear a invalidade das buscas e apreensões.", "D": "Pleitear a invalidade da busca e apreensão pessoal de Arnaldo, mas não a da busca e apreensão residencial de Adolfo."}, fb:{"A": "Incorreta. A busca pessoal em Arnaldo foi válida — havia fundada suspeita (apontamento imediato pela vítima de roubo recém-praticado).", "B": "Correta! Art. 5º, XI, CF: a casa é asilo inviolável, ninguém podendo nela penetrar sem consentimento do morador, salvo flagrante delito, desastre, prestar socorro, ou, durante o dia, por determinação judicial. Mesmo com mandado JUDICIAL, a busca domiciliar só pode ser cumprida DURANTE O DIA. O mandado foi cumprido às 03h00 (madrugada), sem consentimento do morador e sem hipótese de flagrante/desastre/socorro — busca INVÁLIDA. Já a busca PESSOAL em Arnaldo, por outro lado, dispensa mandado quando há fundada suspeita — e aqui havia apontamento imediato pela vítima de um crime recém-praticado, configurando fundada suspeita válida.", "C": "Incorreta. A busca domiciliar de Adolfo pode (e deve) ser questionada — foi cumprida fora do horário constitucionalmente permitido.", "D": "Incorreta. Inverte a lógica: a busca pessoal de Arnaldo foi válida; a domiciliar de Adolfo é que foi ilegal."}, fund:"Art. 5º, XI, CF: busca domiciliar com mandado só pode ser cumprida durante o dia, salvo flagrante, desastre, socorro ou consentimento do morador. Busca pessoal dispensa mandado havendo fundada suspeita de posse de objeto relacionado a crime.", caqui:"Duas regras diferentes para casa e pessoa: CASA = proteção constitucional máxima. Mesmo com mandado judicial, só pode entrar DE DIA (salvo flagrante, desastre, socorro, ou consentimento). Entrar às 03h da manhã com mandado, mesmo que o investigado fosse sair às 07h, NÃO autoriza burlar essa regra. PESSOA = busca sem mandado é permitida com fundada suspeita — e aqui havia: vítima apontando o suspeito de crime recém-cometido, configurando flagrância indiciária."},
  {num:11, exame:"XXV Exame — 2018", titulo:"Exame Grafotécnico e a Não Autoincriminação", enunciado:"O MP ofereceu denúncia contra Matheus por estelionato. Na cota da denúncia, solicitou exame grafotécnico para comparar assinaturas de documentos falsos com as de Matheus. Após ser citado, Matheus procura seu advogado e confessa, em sigilo, que realmente foi autor do crime.", comando:"Considerando as informações narradas, sob o ponto de vista técnico, o advogado deverá esclarecer que Matheus", gabarito:"D", alt:{"A": "deverá realizar o exame grafotécnico, segundo as determinações que lhe forem realizadas, já que prevalece no Processo Penal o Princípio da Verdade Real.", "B": "poderá se recusar a realizar o exame grafotécnico até o momento de seu interrogatório, ocasião em que deverá fornecer padrão para o exame grafotécnico, ainda que com assinaturas diferentes daquelas tradicionalmente utilizadas por ele.", "C": "deverá realizar o exame grafotécnico, tendo em vista que, no recebimento da denúncia, prevalece o princípio do in dubio pro societatis.", "D": "poderá se recusar a realizar o exame grafotécnico durante todo o processo, e essa omissão não pode ser interpretada como confissão dos fatos narrados na denúncia."}, fb:{"A": "Incorreta. O princípio da verdade real não autoriza violar a garantia constitucional contra a autoincriminação — não pode obrigar o réu a colaborar ativamente com prova que o incrimine.", "B": "Incorreta. A recusa não se limita até o interrogatório — Matheus pode se recusar durante TODO o processo, sem prazo de validade para essa proteção.", "C": "Incorreta. O in dubio pro societatis (presunção em favor da sociedade no recebimento da denúncia) não autoriza compelir o réu a produzir prova contra si.", "D": "Correta! Princípio nemo tenetur se detegere: o exame grafotécnico exige a participação ativa de Matheus (escrever/assinar para fornecer padrão de comparação). Como ninguém é obrigado a produzir prova contra si mesmo, Matheus pode se recusar a colaborar — durante todo o processo —, e essa recusa NÃO PODE ser interpretada como confissão dos fatos."}, fund:"Princípio nemo tenetur se detegere (não autoincriminação): protege o acusado de qualquer ato que exija colaboração ativa para a produção de prova incriminadora, incluindo fornecimento de padrão gráfico para perícia grafotécnica.", caqui:"Mesma lógica da Q4 (acareação) aplicada aqui: o exame grafotécnico exige que Matheus escreva/assine ATIVAMENTE para servir de comparação. Isso é exatamente o tipo de colaboração ativa que o nemo tenetur se detegere protege. Matheus pode recusar — para sempre, não só até o interrogatório — e essa recusa não pesa contra ele como se fosse confissão. O segredo profissional (advogado-cliente) também é relevante aqui: a confissão sigilosa não autoriza o advogado a 'entregar' o cliente."},
  {num:12, exame:"XXIV Exame — 2017", titulo:"Testemunhas Proibidas e Dispensadas do Dever de Depor", enunciado:"Durante instrução probatória de peculato imputado a João, foram intimados para depor: os policiais civis que participaram das investigações, a ex-esposa de João (que tinha conhecimento dos fatos) e o padre para o qual João contava seus 'pecados', inclusive sobre os desvios de dinheiro público.", comando:"Considerando apenas as informações narradas, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Somente o advogado da ex-esposa de João poderá requerer que sua cliente seja eximida do dever de depor, devendo os demais prestar depoimento.", "B": "Todos os advogados poderão requerer que seus clientes sejam eximidos do dever de depor.", "C": "Apenas o advogado do padre poderá buscar que ele não preste declarações, já que proibido, por ofício, de depor, devendo os demais prestar declarações.", "D": "Apenas os advogados da ex-esposa de João e do padre poderão requerer que seus clientes não sejam ouvidos na condição de testemunhas."}, fb:{"A": "Incorreta. O padre também tem proteção — não apenas a ex-esposa.", "B": "Incorreta. Os policiais civis NÃO se enquadram nas hipóteses de dispensa/proibição apenas por terem investigado o caso — devem depor normalmente.", "C": "Incorreta. A ex-esposa também pode ser dispensada — não apenas o padre.", "D": "Correta! Três grupos distintos: (1) POLICIAIS CIVIS investigadores: devem depor normalmente, pois participar da investigação não dispensa do dever de testemunhar. (2) EX-ESPOSA: vínculo familiar relevante autoriza pedido de DISPENSA do dever de depor (art. 206, CPP — figuras próximas ao acusado). (3) PADRE: conheceu os fatos em razão do ofício religioso (confissão) — está PROIBIDO de depor sobre esse conteúdo protegido por sigilo, salvo desobrigado pela parte interessada e desejando depor."}, fund:"Art. 206, CPP: pessoas com vínculo próximo ao acusado podem se recusar a depor. Art. 207, CPP: pessoas que devam guardar sigilo em razão de função, ministério, ofício ou profissão estão proibidas de depor sobre esses fatos, salvo desobrigadas pela parte interessada e desejando dar o testemunho.", caqui:"Três categorias de testemunhas: (1) DEVEM DEPOR normalmente: testemunhas comuns, incluindo policiais que investigaram (a participação na investigação não gera impedimento ou dispensa automática). (2) PODEM SE RECUSAR (dispensa facultativa): familiares próximos do acusado, como cônjuge/ex-cônjuge, ascendentes, descendentes. (3) ESTÃO PROIBIDOS de depor sobre o conteúdo: quem soube dos fatos por sigilo profissional/religioso (padre, advogado, médico), salvo se a parte interessada desobrigar e a pessoa quiser depor."},
  {num:13, exame:"XX Exame — 2016 (Reaplicação)", titulo:"Testemunha Referida — Não Computada no Número Máximo", enunciado:"Hugo foi denunciado por furto qualificado contra Rosa. Na audiência, Rosa confirmou a autoria, mas apresentou versão repleta de contradições, inovando ao afirmar que estava junto com Lúcia quando foi vítima do crime. O MP ouviu apenas os policiais que participaram da prisão de Hugo e não deseja ouvir novas testemunhas. A defesa requer a oitiva de Lúcia, mencionada por Rosa, já que antes não tinha conhecimento sobre ela, mas o juiz indefere por já ter sido arrolado o número máximo de testemunhas.", comando:"Diante dessa situação, o advogado de Hugo deve alegar que", gabarito:"A", alt:{"A": "as testemunhas referidas não devem ser computadas para fins do número máximo de testemunhas a serem ouvidas.", "B": "o Código de Processo Penal não traz número máximo de testemunhas de defesa, pois previsão em contrário violaria o princípio da ampla defesa.", "C": "as testemunhas referidas não podem prestar compromisso de dizer a verdade.", "D": "o depoimento de Rosa, ao inovar os fatos, deve ser considerado prova ilícita, a fim de ser desentranhado dos autos."}, fb:{"A": "Correta! Testemunha REFERIDA é aquela mencionada no depoimento de outra testemunha/vítima já ouvida, surgindo no curso da instrução, sem que a parte tivesse prévio conhecimento de sua existência. Lúcia se enquadra perfeitamente — apareceu apenas porque Rosa a mencionou em juízo. Testemunhas referidas NÃO entram na contagem do número máximo de testemunhas previamente arroladas pelas partes (que é limitado pelo CPP), justamente por surgirem de forma imprevisível durante a instrução.", "B": "Incorreta. O CPP TRAZ SIM número máximo de testemunhas (varia conforme o procedimento — comum ordinário, sumário, sumaríssimo). A questão não é a inexistência de limite, mas o fato de que testemunha referida não entra nesse limite.", "C": "Incorreta. A testemunha referida PODE prestar compromisso de dizer a verdade normalmente, desde que ouvida como testemunha (e não esteja em hipótese de dispensa/proibição).", "D": "Incorreta. O depoimento de Rosa não é ilícito apenas por trazer informação nova ou contraditória — isso é normal na dinâmica de depoimentos e gera, no máximo, necessidade de complementação probatória (oitiva da testemunha referida)."}, fund:"Testemunha referida: aquela mencionada por outra testemunha/vítima durante seu depoimento, cuja existência só se revela no curso da instrução. Jurisprudência: não se computa no limite numérico de testemunhas arroladas pelas partes na denúncia/resposta à acusação.", caqui:"Regra para decorar: testemunha ARROLADA (na denúncia ou resposta à acusação) = conta no limite numérico do procedimento. Testemunha REFERIDA (surge durante a instrução, mencionada por quem já foi ouvido) = NÃO conta nesse limite — é uma categoria especial, justamente porque ninguém poderia tê-la arrolado antes, pois sua existência era desconhecida."},
  {num:14, exame:"XIX Exame — 2016", titulo:"Carta Precatória, Segredo Profissional e Contradita", enunciado:"Thales foi denunciado por apropriação indébita. Para oitiva da vítima Marcos (em outra cidade), foi expedida carta precatória, com intimação de todas as partes. Antes do retorno, realizou-se audiência de instrução, ouvindo apenas as testemunhas João e José, com versões absolutamente discrepantes sobre circunstâncias relevantes (ambas afirmaram estar no local). Hélio, padre que ouviu a confissão de Thales (com conhecimento da dinâmica delitiva, em razão do dever de guardar segredo), não foi intimado. A audiência de continuação foi remarcada com concordância das partes.", comando:"Considerando apenas as informações narradas, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O depoimento de João foi inválido, já que a oitiva do ofendido deve ser realizada antes das demais testemunhas e a expedição de carta precatória suspende a instrução criminal.", "B": "O juiz poderá fazer a contradita, diante das contradições sobre circunstâncias relevantes nos depoimentos das testemunhas.", "C": "Hélio está proibido de depor sem autorização da parte interessada, salvo quando não for possível, por outro modo, obter a prova do fato.", "D": "O advogado do acusado não precisa ser intimado pessoalmente da data designada para audiência a ser realizada no juízo deprecado."}, fb:{"A": "Incorreta. A expedição de carta precatória NÃO suspende automaticamente a instrução criminal — o juízo pode prosseguir com outros atos instrutórios normalmente.", "B": "Incorreta. A contradita NÃO serve para resolver contradições de conteúdo entre depoimentos — serve para impugnar a IDONEIDADE, IMPARCIALIDADE ou CAPACIDADE da própria testemunha. Contradição entre versões é questão de valoração probatória, não de contradita.", "C": "Correta! Art. 207, CPP: são proibidas de depor as pessoas que, em razão de função, ministério, ofício ou profissão, devam guardar segredo — salvo se, desobrigadas pela parte interessada, quiserem dar o testemunho. Hélio, padre que ouviu a confissão de Thales, está protegido pelo sigilo religioso — não deve depor sobre esse conteúdo, salvo autorização da parte interessada (Thales) E vontade própria de depor.", "D": "Incorreta. O advogado do acusado DEVE ser intimado pessoalmente da data da audiência designada no juízo deprecado, sob pena de violação do contraditório e da ampla defesa."}, fund:"Art. 207, CPP: proibição de depor para quem deve guardar segredo profissional/ministerial, salvo desobrigação pela parte interessada e vontade de depor. Carta precatória não suspende a instrução, salvo decisão expressa nesse sentido.", caqui:"Hélio (padre) está na categoria de PESSOAS PROIBIDAS de depor sobre o conteúdo conhecido por sigilo profissional — diferente das pessoas meramente DISPENSADAS (que podem optar por depor ou não). Para o padre depor sobre a confissão, é preciso: (1) Thales (parte interessada) desobrigá-lo do sigilo, E (2) o próprio padre desejar depor. Sem isso, ele simplesmente não deve depor sobre aquele conteúdo específico."},
  {num:15, exame:"XIV Exame — 2014", titulo:"Interceptação Telefônica Ilícita e Teoria dos Frutos da Árvore Envenenada", enunciado:"O Delegado de Polícia, desconfiado de que Fabiano era líder de quadrilha de assaltos, decidiu, com sua equipe, realizar interceptação telefônica SEM autorização judicial. Durante semanas, descobriram o local onde a res furtiva era armazenada. Com essa informação, representou pela busca e apreensão na residência suspeita, sendo a diligência autorizada pelo Juízo competente. Munidos do mandado, encontraram diversos objetos fruto de roubo.", comando:"Acerca do caso narrado, assinale a opção correta.", gabarito:"D", alt:{"A": "A realização da busca e apreensão é admissível, tendo em vista que houve autorização prévia do juízo competente, existindo justa causa para ajuizamento da ação penal.", "B": "A realização da busca e apreensão é admissível, apesar da interceptação telefônica ter sido realizada sem autorização judicial, existindo justa causa para ajuizamento da ação penal.", "C": "A realização da busca e apreensão não é admissível porque houve representação do Delegado de Polícia, não existindo justa causa para o ajuizamento da ação penal.", "D": "A realização da busca e apreensão não é admissível, pois derivou de uma interceptação telefônica ilícita, aplicando-se a teoria dos frutos da árvore envenenada, não existindo justa causa para o ajuizamento da ação penal."}, fb:{"A": "Incorreta. A autorização judicial PARA A BUSCA não 'purifica' a prova — a busca só foi possível porque a informação sobre o local veio diretamente da interceptação ilícita. A contaminação se mantém.", "B": "Incorreta. A interceptação telefônica sem autorização judicial é prova ilícita, e a busca dela derivada também é contaminada — não pode ser admitida sem haver fonte independente.", "C": "Incorreta. O problema não está em o Delegado ter representado pela busca (isso é regular) — está na ORIGEM ilícita da informação que fundamentou o pedido.", "D": "Correta! A interceptação telefônica SEM autorização judicial é prova ilícita (viola art. 5º, XII, CF e Lei 9.296/96). A busca e apreensão, embora formalmente autorizada por juiz, derivou DIRETAMENTE das informações obtidas pela interceptação ilegal — não há indicação de fonte independente no enunciado. Aplica-se a teoria dos frutos da árvore envenenada (art. 157, §1º, CPP): a prova derivada da ilícita também é inadmissível, faltando justa causa para a ação penal."}, fund:"Art. 5º, XII, CF e Lei 9.296/96: interceptação telefônica exige autorização judicial. Art. 157, §1º, CPP: são inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade ou quando puderem ser obtidas por fonte independente.", caqui:"Teoria dos frutos da árvore envenenada: raiz contaminada (interceptação ilegal) → fruto contaminado (busca e apreensão baseada nessa interceptação), mesmo que o juiz tenha 'autorizado' a busca em si. A autorização judicial da busca não examinou se a fundamentação do pedido era lícita — apenas autorizou com base no que foi apresentado. Sem prova de FONTE INDEPENDENTE (algo que descobriria o mesmo resultado por outro caminho lícito), a contaminação persiste."},
  {num:16, exame:"X Exame — 2013", titulo:"Medidas Assecuratórias — Sequestro de Bens Adquiridos com Proventos do Crime", enunciado:"No curso de investigação de sonegação fiscal e evasão de divisas, o Procurador da República requereu ao Juízo Federal Criminal medida assecuratória, tendo obtido documentos que informavam os bens adquiridos pelo investigado com proventos da infração penal. O Juiz Federal decretou a medida assecuratória, que foi cumprida.", comando:"A partir do caso apresentado, assinale a alternativa que indica a medida assecuratória adotada.", gabarito:"C", alt:{"A": "Busca e Apreensão.", "B": "Arresto.", "C": "Sequestro.", "D": "Hipoteca Legal."}, fb:{"A": "Incorreta. Busca e apreensão não é medida assecuratória patrimonial — é meio de obtenção de prova/objetos relevantes à investigação.", "B": "Incorreta. O arresto é medida de constrição patrimonial sobre bens LÍCITOS do acusado, geralmente quando ainda não foi possível especializar bens para hipoteca legal — não é a medida específica para bens adquiridos com produto do crime.", "C": "Correta! Art. 125 a 133, CPP: o SEQUESTRO recai especificamente sobre bens (móveis ou imóveis) ADQUIRIDOS COM OS PROVENTOS DA INFRAÇÃO PENAL — exatamente a hipótese descrita ('bens que teriam sido adquiridos pelo investigado com proventos da infração penal'). É a medida cabível quando há prova da origem ilícita do bem.", "D": "Incorreta. A hipoteca legal recai sobre imóveis LÍCITOS do acusado, para garantir futura reparação do dano/indenização — não pressupõe que o bem tenha origem no produto do crime."}, fund:"Art. 125, CPP: sequestro de bens imóveis (e, por extensão, móveis) adquiridos com os proventos da infração penal. Art. 134-135, CPP: hipoteca legal sobre bens lícitos do acusado para garantir reparação. Art. 136-137, CPP: arresto como medida subsidiária à hipoteca.", caqui:"A palavra-chave que entrega a resposta: 'bens adquiridos com proventos da infração penal' = SEQUESTRO, sempre. Memoriza a tríade: SEQUESTRO = origem ilícita do bem (comprado com dinheiro do crime). HIPOTECA LEGAL = bem lícito, para garantir indenização. ARRESTO = constrição subsidiária quando ainda não dá para especializar a hipoteca."},
  {num:17, exame:"VII Exame — 2012", titulo:"Interrogatório Judicial — Questão INCORRETA sobre Videoconferência", enunciado:"De acordo com o CPP, quanto ao interrogatório judicial, assinale a afirmativa INCORRETA.", comando:"Assinale a afirmativa INCORRETA.", gabarito:"D", alt:{"A": "O silêncio do acusado não importará confissão e não poderá ser interpretado em prejuízo da defesa, mesmo no caso de crimes hediondos.", "B": "A todo tempo o juiz poderá, atendendo pedido fundamentado das partes, ou mesmo de ofício, proceder a novo interrogatório, mesmo quando os autos já se encontrarem conclusos para sentença.", "C": "O mudo será interrogado oralmente, devendo responder às perguntas por escrito, salvo quando não souber ler e escrever, situação em que intervirá no ato, como intérprete e sob compromisso, pessoa habilitada a entendê-lo.", "D": "O juiz, por decisão fundamentada, poderá realizar o interrogatório do réu preso por sistema de videoconferência, desde que a medida seja necessária para reduzir os custos para a Administração Pública."}, fb:{"A": "Correta (afirmação VERDADEIRA). O direito ao silêncio não pode ser interpretado em prejuízo do réu, para qualquer crime, incluindo hediondos — sem exceção.", "B": "Correta (afirmação VERDADEIRA). O CPP admite novo interrogatório a qualquer tempo, mediante pedido fundamentado ou de ofício, mesmo com os autos conclusos para sentença.", "C": "Correta (afirmação VERDADEIRA). Regra específica para o réu mudo: interrogatório oral, resposta escrita; se não souber ler/escrever, entra intérprete habilitado sob compromisso.", "D": "INCORRETA (é a alternativa a ser marcada) ✅ A videoconferência NÃO pode ser justificada apenas por REDUÇÃO DE CUSTOS administrativos. O CPP autoriza essa modalidade excepcional apenas por motivos legalmente previstos: risco à segurança pública, fuga do réu, dificuldade de comparecimento por enfermidade/circunstância grave, evitar influência sobre vítima/testemunha, responder a gravíssima questão de ordem pública. Economia de recursos NÃO é fundamento legal autônomo."}, fund:"CPP, art. 185 e seguintes: hipóteses excepcionais para videoconferência são listadas taxativamente (segurança pública, fuga, dificuldade de comparecimento, influência sobre testemunhas/vítimas, gravíssima questão de ordem pública). Mera redução de custos não é fundamento legal.", caqui:"Questão pede a INCORRETA — cuidado para não confundir. Três alternativas (A, B, C) reproduzem regras corretas e bem conhecidas do CPP sobre interrogatório. A pegadinha está na D: videoconferência é medida EXCEPCIONAL, com hipóteses taxativas previstas em lei — economia de recursos públicos NÃO está entre elas. Não confunda 'praticidade administrativa' com os fundamentos legais que realmente autorizam essa modalidade."},
  {num:18, exame:"V Exame — 2011", titulo:"Prova Ilícita por Derivação — Teoria dos Frutos da Árvore Envenenada", enunciado:"A respeito da prova no processo penal, assinale a alternativa correta.", comando:"Assinale a alternativa correta.", gabarito:"D", alt:{"A": "A prova objetiva demonstra a existência/inexistência de um determinado fato ou a veracidade/falsidade de uma determinada alegação. Todos os fatos, em sede de processo penal, devem ser provados.", "B": "São consideradas provas ilícitas aquelas obtidas com a violação do direito processual. Por outro lado, são consideradas provas ilegítimas as obtidas com a violação das regras de direito material.", "C": "As leis em geral e os costumes não precisam ser comprovados.", "D": "A lei processual pátria prevê expressamente a inadmissibilidade da prova ilícita por derivação, perfilhando-se à 'teoria dos frutos da árvore envenenada' (fruits of poisonous tree)."}, fb:{"A": "Incorreta. Nem todos os fatos precisam ser provados — fatos notórios, presunções legais e leis em geral independem de prova específica.", "B": "Incorreta. A alternativa inverte os conceitos: prova ILÍCITA = violação de norma de DIREITO MATERIAL (ex: tortura, invasão domiciliar ilegal); prova ILEGÍTIMA = violação de norma PROCESSUAL (forma de produção da prova).", "C": "Incorreta. A afirmação é ampla demais — leis, em regra, não precisam de prova (iura novit curia), mas a alternativa generaliza incorretamente sobre costumes, que podem demandar comprovação dependendo do contexto.", "D": "Correta! Art. 157, §1º, CPP: são também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras. O CPP adota expressamente a teoria dos frutos da árvore envenenada (fruits of poisonous tree)."}, fund:"Art. 157, §1º e §2º, CPP: inadmissibilidade da prova ilícita por derivação, com exceções de ausência de nexo causal ou fonte independente.", caqui:"Definições para memorizar: PROVA ILÍCITA = viola norma de direito MATERIAL (ex: tortura para obter confissão, invasão de domicílio sem mandado). PROVA ILEGÍTIMA = viola norma PROCESSUAL (forma errada de produzir a prova). PROVA ILÍCITA POR DERIVAÇÃO = nasce de uma prova ilícita anterior — também é inadmissível, salvo exceções (fonte independente, descoberta inevitável, ausência de nexo causal)."},
  {num:19, exame:"3º Exame — 2010 (CESPE)", titulo:"Juiz Contaminado por Prova Ilícita — Art. 157 §5º CPP", enunciado:"Considerando a legislação em vigor em relação à prova criminal, assinale a opção correta.", comando:"Assinale a opção correta.", gabarito:"D", alt:{"A": "De acordo com a CF, são inadmissíveis, sob pena de nulidade, as provas ilícitas e as derivadas das ilícitas, assim entendidas as obtidas com violação de norma constitucional ou legal.", "B": "As provas ilícitas que puderem ser obtidas pelos trâmites típicos e de praxe, próprios da investigação ou instrução criminal, podem ser admitidas no processo para beneficiar o réu ou satisfazer a pretensão punitiva do Estado.", "C": "A exibição, no plenário do tribunal do júri, de documento do qual não se tenha dado ciência às partes é prova ilegítima e gera nulidade do julgamento, não impedindo, contudo, que essa prova seja utilizada posteriormente.", "D": "O juiz que tomar conhecimento do conteúdo de prova declarada inadmissível não pode proferir a sentença, devendo, no caso do tribunal do júri, o juiz presidente dissolver o conselho de sentença."}, fb:{"A": "Incorreta. A regra detalhada sobre prova ilícita por derivação (incluindo as exceções de nexo causal e fonte independente) está no CPP (art. 157, §§1º e 2º), não diretamente na CF — a alternativa atribui imprecisamente todo o regime à Constituição.", "B": "Incorreta. Prova ilícita NUNCA pode ser admitida para satisfazer a pretensão punitiva do Estado — essa é justamente a vedação constitucional. A alternativa contraria o sistema de garantias.", "C": "Incorreta. A questão não reflete corretamente a disciplina do tema — a exibição irregular de documento no júri pode gerar nulidade, mas a alternativa simplifica incorretamente as consequências.", "D": "Correta! Art. 157, §5º, CPP (incluído pela Lei 13.964/2019 — Pacote Anticrime): o juiz que conhecer do conteúdo da prova declarada inadmissível não poderá proferir a sentença ou acórdão. A lógica é evitar a 'contaminação' do julgador — mesmo que a prova seja formalmente desentranhada, seu conteúdo já influenciou a convicção do magistrado. No Tribunal do Júri, se o conteúdo de prova inadmissível chegou ao conhecimento do Conselho de Sentença, há contaminação que pode levar à dissolução do conselho."}, fund:"Art. 157, §5º, CPP (Lei 13.964/2019): juiz que conhece prova inadmissível não pode sentenciar. Art. 157, §1º e §2º, CPP: regime da prova ilícita por derivação e suas exceções.", caqui:"A teoria do 'juiz contaminado' (art. 157, §5º, CPP): de nada adianta desentranhar formalmente a prova ilícita dos autos — o conhecimento já 'entrou na cabeça' do julgador, comprometendo sua imparcialidade. Por isso, a lei impede que ESSE MESMO juiz profira a sentença. No júri, se o conteúdo proibido chegou ao conhecimento dos jurados (Conselho de Sentença), a solução é dissolver o conselho e reiniciar o julgamento com outros jurados."},
  {num:20, exame:"I Exame — 2010 (CESPE)", titulo:"Documentos, Testemunhas e Acareação — Não Restrita a Acusados", enunciado:"Com relação aos meios de prova no processo penal, assinale a opção correta de acordo com o CPP.", comando:"Assinale a opção correta de acordo com o CPP.", gabarito:"B", alt:{"A": "Se o juiz tiver notícia da existência de documento relativo a ponto relevante da acusação ou da defesa, não poderá providenciar, independentemente de requerimento das partes, a juntada aos autos, uma vez que é mero espectador do processo, sem atuação de ofício na gestão da prova.", "B": "Em regra, a testemunha não pode se eximir da obrigação de depor. No entanto, o cônjuge do acusado à época do fato criminoso, ainda que dele se encontre separado judicialmente, pode recusar-se a testemunhar.", "C": "Em regra, as partes deverão apresentar os documentos necessários à comprovação de suas alegações na primeira oportunidade que falarem nos autos, sob pena de preclusão.", "D": "O procedimento de acareação só será admitido entre acusados, sendo vedada a acareação entre acusado e testemunha."}, fb:{"A": "Incorreta. O juiz NÃO é mero espectador absoluto — o CPP admite atuação judicial em determinadas providências probatórias, incluindo a juntada de documentos relevantes de ofício.", "B": "Correta! Art. 206, CPP: a testemunha não pode, em regra, eximir-se da obrigação de depor. Mas certas pessoas vinculadas ao acusado podem se recusar a testemunhar, salvo quando não for possível, por outro modo, obter ou integrar a prova do fato e de suas circunstâncias — entre elas, o cônjuge (mesmo que separado judicialmente, conforme a jurisprudência consolidada sobre o vínculo relevante).", "C": "Incorreta. A alternativa exagera ao afirmar preclusão automática rígida na primeira oportunidade — o regime de juntada de documentos no processo penal é mais flexível.", "D": "Incorreta. A acareação NÃO se limita a acusados — pode ocorrer entre acusado e testemunha, testemunha e testemunha, acusado e ofendido, entre outras combinações (art. 229, CPP)."}, fund:"Art. 206, CPP: regra geral do dever de depor, com exceção para pessoas vinculadas ao acusado (cônjuge, ascendente, descendente, irmão). Art. 229, CPP: acareação pode ocorrer entre acusados, entre acusado e testemunha, entre testemunhas, entre acusado e ofendido.", caqui:"Três pegadinhas clássicas reunidas: (1) Juiz NÃO é mero espectador — pode determinar diligências de ofício. (2) Acareação NÃO é exclusiva entre corréus — abrange diversas combinações. (3) Dever de depor é REGRA, mas tem exceção para vínculo familiar relevante (cônjuge, mesmo separado judicialmente, ainda guarda essa proteção pela época do fato)."},
  {num:21, exame:"II Exame — 2010", titulo:"Ônus da Prova e In Dubio Pro Reo na Legítima Defesa", enunciado:"Em uma briga de bar, Joaquim feriu Pedro com uma faca, causando-lhe sérias lesões. O MP denunciou Joaquim por lesão corporal grave. Na audiência, as testemunhas de defesa afirmaram que Pedro havia apontado arma de fogo, e Joaquim agrediu Pedro com a faca apenas para se defender. As testemunhas de acusação disseram não ter visto arma. Nas alegações finais, defesa pediu absolvição alegando legítima defesa; MP pediu condenação. O juiz constatou que remanescia fundada dúvida sobre se Joaquim agrediu Pedro em legítima defesa.", comando:"Considerando tal narrativa, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O ônus de provar a situação de legítima defesa era da defesa. Assim, como o juiz não se convenceu completamente da ocorrência de legítima defesa, deve condenar o réu.", "B": "O ônus de provar a situação de legítima defesa era da acusação. Assim, como o juiz não se convenceu completamente da ocorrência de legítima defesa, deve condenar o réu.", "C": "O ônus de provar a situação de legítima defesa era da defesa. No caso, como o juiz ficou em dúvida sobre a ocorrência de legítima defesa, deve absolver o réu.", "D": "Permanecendo qualquer dúvida no espírito do juiz, ele está impedido de proferir a sentença. A lei obriga o juiz a esgotar todas as diligências que estiverem a seu alcance para dirimir dúvidas, sob pena de nulidade da sentença que vier a ser prolatada."}, fb:{"A": "Incorreta. A primeira parte está correta (ônus da defesa), mas a conclusão está errada: dúvida razoável favorece o réu (in dubio pro reo) — não autoriza condenação.", "B": "Incorreta. Quando a defesa alega uma excludente de ilicitude (legítima defesa), o ônus de demonstrar essa tese recai sobre a própria defesa, que traz elementos para sustentá-la.", "C": "Correta! A defesa, ao alegar legítima defesa, assumiu o ônus de demonstrar a excludente. Contudo, se a prova produzida deixa o juiz em DÚVIDA RAZOÁVEL sobre sua ocorrência, aplica-se o princípio do in dubio pro reo — a dúvida favorece o réu, devendo o juiz absolver, e não condenar.", "D": "Incorreta. O juiz NÃO fica impedido de sentenciar por persistir dúvida — ele julga normalmente, aplicando o in dubio pro reo se a dúvida remanescer ao final da instrução. Não existe obrigação absoluta de esgotar diligências sob pena de nulidade."}, fund:"Princípio do in dubio pro reo: dúvida razoável ao final da instrução favorece o acusado. Embora a defesa tenha o ônus de demonstrar excludentes de ilicitude que alega, a dúvida persistente sobre sua ocorrência conduz à absolvição, não à condenação.", caqui:"Combinação importante: (1) Quem alega excludente (legítima defesa) tem o ônus de trazer prova sobre ela — isso é regra de distribuição do ônus probatório. (2) MAS se, ao final, persiste dúvida razoável (nem a defesa provou totalmente a excludente, nem a acusação afastou totalmente a possibilidade dela), o juiz aplica in dubio pro reo e ABSOLVE. Não confunda 'quem tem o ônus de provar' com 'quem ganha em caso de empate probatório' — no processo penal, o empate sempre favorece o réu."},
  {num:22, exame:"2º Exame — 2009 (CESPE)", titulo:"Perícia com Um Perito Oficial, Carta Precatória e Citação com Hora Certa", enunciado:"A respeito dos meios de prova e das citações e intimações no âmbito do direito processual penal, assinale a opção correta.", comando:"Assinale a opção correta.", gabarito:"D", alt:{"A": "O exame de corpo de delito e outras perícias devem ser feitos, necessariamente, por dois peritos oficiais ou, na impossibilidade de estes o fazerem, por duas pessoas idôneas assim consideradas pelo juiz.", "B": "Tratando-se de processo penal, é absoluta a nulidade por falta de intimação da expedição de precatória para inquirição de testemunha.", "C": "O procedimento de acareação, objeto de severas críticas por violar o princípio da dignidade da pessoa humana, foi extinto pela recente reforma do CPP.", "D": "O oficial de justiça, ao verificar que o réu se oculta para não ser citado, deve certificar a ocorrência e proceder à citação com hora certa, na forma estabelecida no CPC."}, fb:{"A": "Incorreta. Desde a Lei 11.690/2008, a regra é que basta UM perito oficial para a perícia. Apenas na ausência de perito oficial é que se recorre a DUAS pessoas idôneas com curso superior, preferencialmente na área específica.", "B": "Incorreta. A falta de intimação da expedição de precatória NÃO gera nulidade absoluta automática — a jurisprudência exige demonstração de prejuízo concreto para reconhecer a nulidade.", "C": "Incorreta. A acareação CONTINUA prevista no CPP (art. 229 e seguintes) — não foi extinta, podendo ocorrer entre acusados, testemunhas, acusado e testemunha, acusado e ofendido, entre outras combinações.", "D": "Correta! Ao verificar que o réu se oculta para não ser citado, o oficial de justiça deve certificar a ocorrência e proceder à citação com hora certa, aplicando-se subsidiariamente a forma estabelecida no Código de Processo Civil (CPC), na ausência de regulamentação específica e completa no CPP."}, fund:"Lei 11.690/2008: alterou o CPP para exigir apenas 1 perito oficial. Art. 229, CPP: acareação prevista e não extinta. CPP/CPC: citação com hora certa aplicável quando o réu se oculta deliberadamente para evitar a citação.", caqui:"Três armadilhas clássicas em uma questão: (1) Perícia: NÃO precisa de dois peritos oficiais desde 2008 — basta um. (2) Falta de intimação de precatória: NÃO gera nulidade absoluta automática — exige prova de prejuízo. (3) Acareação: NÃO foi extinta — continua válida e prevista expressamente no CPP. A única correta trata da citação com hora certa, instituto regularmente aplicável quando o réu se esconde de propósito para não ser citado."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn vn" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn vn sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn vn';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
